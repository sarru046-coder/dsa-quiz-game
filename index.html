<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DSA Quiz Master</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0c29;color:#fff;font-family:Arial,sans-serif;min-height:100vh}
.page{display:none;padding:16px;max-width:700px;margin:0 auto;padding-bottom:60px}
.page.active{display:block}
h1{font-size:28px;font-weight:900;color:#a78bfa;text-align:center;margin:20px 0 8px}
h2{font-size:20px;font-weight:800;margin-bottom:12px}
h3{font-size:16px;font-weight:700;margin-bottom:10px}
p{color:rgba(255,255,255,0.6);font-size:14px;text-align:center;margin-bottom:16px}
.hero{font-size:64px;text-align:center;margin:16px 0;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:18px;margin-bottom:14px}
.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.topic-btn{border-radius:14px;padding:16px 10px;cursor:pointer;text-align:center;border:1px solid;background:none;color:#fff;font-family:Arial,sans-serif}
.topic-btn:active{opacity:0.7}
.topic-emoji{font-size:28px;display:block;margin-bottom:6px}
.topic-name{font-size:13px;font-weight:700;display:block}
.topic-count{font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-top:2px}
.btn{display:inline-block;border:none;color:#fff;border-radius:12px;padding:12px 22px;cursor:pointer;font-size:14px;font-weight:700;margin:4px;font-family:Arial,sans-serif}
.btn:active{opacity:0.8}
.btn-ghost{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)}
.btn-back{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:8px 16px;cursor:pointer;color:#fff;font-size:13px;font-weight:700;font-family:Arial,sans-serif;margin-bottom:16px}
.btn-back:active{opacity:0.7}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;background:rgba(255,255,255,0.05);border-radius:14px;padding:10px 14px}
.topbar-title{flex:1;font-weight:700;font-size:15px}
.badge{display:inline-block;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:700;border:1px solid}
.progress{background:rgba(255,255,255,0.08);border-radius:99px;height:6px;overflow:hidden;margin-top:4px}
.progress-bar{height:100%;border-radius:99px;transition:width 0.4s}
.opt-btn{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:13px 16px;color:#fff;cursor:pointer;font-size:14px;text-align:left;margin-bottom:10px;display:flex;align-items:center;gap:12px;font-family:Arial,sans-serif}
.opt-btn:active{background:rgba(255,255,255,0.15)}
.opt-correct{background:rgba(29,209,161,0.2)!important;border-color:#1DD1A1!important}
.opt-wrong{background:rgba(255,107,107,0.2)!important;border-color:#FF6B6B!important}
.opt-icon{min-width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.correct-icon{background:#1DD1A1}
.wrong-icon{background:#FF6B6B}
.theory-point{display:flex;gap:10px;padding:10px 14px;margin-bottom:8px;background:rgba(255,255,255,0.04);border-radius:10px;border-left:3px solid #a78bfa;font-size:14px;line-height:1.7;color:rgba(255,255,255,0.87)}
.celebrate{text-align:center;padding:20px;border-radius:18px;margin-bottom:14px;animation:pop 0.4s ease}
@keyframes pop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.celebrate-emoji{font-size:68px;display:block;margin-bottom:8px}
.celebrate-msg{font-size:20px;font-weight:900}
.wrong-box{background:rgba(255,107,107,0.07);border:1px solid rgba(255,107,107,0.3);border-radius:18px;padding:18px;margin-bottom:14px}
.explain-box{background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px;margin:10px 0;font-size:14px;line-height:1.75;color:rgba(255,255,255,0.87)}
.tip-box{background:rgba(84,160,255,0.08);border:1px solid rgba(84,160,255,0.25);border-radius:10px;padding:10px 14px;font-size:12px;color:#54A0FF}
.why-box{background:rgba(255,255,255,0.04);border-radius:14px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.75;color:rgba(255,255,255,0.87)}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:rgba(255,255,255,0.06);border-radius:14px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:900}
.stat-lbl{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.perf-bar-wrap{background:rgba(255,255,255,0.06);border-radius:99px;height:12px;overflow:hidden;margin:10px 0 6px}
.perf-bar{height:100%;border-radius:99px;transition:width 1s ease}
.confetti-wrap{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:999}
.cf{position:absolute;font-size:28px;animation:fall 1.8s ease-in forwards;top:-40px}
@keyframes fall{to{top:110vh;transform:rotate(720deg);opacity:0}}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.path-card{border-radius:16px;padding:18px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05)}
.path-card:active{opacity:0.7}
.path-emoji{font-size:42px;display:block;margin-bottom:8px}
.path-title{font-size:15px;font-weight:800;display:block;margin-bottom:6px}
.path-sub{font-size:12px;color:rgba(255,255,255,0.4);display:block;margin-bottom:14px}
.scores-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
</style>
</head>
<body>

<!-- CONFETTI -->
<div class="confetti-wrap" id="confetti"></div>

<!-- HOME -->
<div id="pg-home" class="page active">
  <div class="hero">🧠</div>
  <h1>DSA Quiz Master</h1>
  <p>Arrays to DP · Theory + LeetCode · Celebrations for correct answers</p>
  <div id="home-scores" class="scores-row" style="display:none"></div>
  <div class="card">
    <h2>📚 Choose a Topic</h2>
    <p style="text-align:left;margin-bottom:0;color:rgba(255,255,255,0.4);font-size:13px">Theory + concept questions + real LeetCode problems</p>
    <div class="topic-grid" id="topic-grid"></div>
  </div>
</div>

<!-- TOPIC -->
<div id="pg-topic" class="page">
  <button class="btn-back" onclick="showHome()">← Back</button>
  <div id="topic-hero" class="hero" style="font-size:72px"></div>
  <h1 id="topic-title" style="margin-bottom:4px"></h1>
  <p id="topic-sub"></p>
  <div class="two-col">
    <div class="path-card" id="theory-path-card">
      <span class="path-emoji">📖</span>
      <span class="path-title" id="theory-path-title">Read Theory</span>
      <span class="path-sub">Core concepts & patterns</span>
      <button class="btn" id="theory-path-btn" onclick="showTheory()">Open Notes →</button>
    </div>
    <div class="path-card" onclick="showQuiz()">
      <span class="path-emoji">🧠</span>
      <span class="path-title" style="color:#FECA57">Take Quiz</span>
      <span class="path-sub">Theory + LeetCode Qs</span>
      <button class="btn" style="background:linear-gradient(135deg,#FECA57,#FF9F43)" onclick="showQuiz()">Start Quiz! →</button>
    </div>
  </div>
  <div class="card">
    <h3>📋 What's inside:</h3>
    <div id="topic-list"></div>
  </div>
</div>

<!-- THEORY -->
<div id="pg-theory" class="page">
  <button class="btn-back" onclick="showTopic()">← Back</button>
  <div id="theory-topbar" class="topbar">
    <span id="theory-title" style="font-weight:700;font-size:15px;flex:1"></span>
    <span id="theory-pg" style="font-size:12px;color:rgba(255,255,255,0.4)"></span>
  </div>
  <div class="card">
    <h2 id="theory-heading"></h2>
    <div id="theory-points"></div>
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap" id="theory-nav"></div>
  </div>
</div>

<!-- QUIZ -->
<div id="pg-quiz" class="page">
  <div class="topbar">
    <button class="btn-back" style="margin-bottom:0" onclick="showTopic()">← Back</button>
    <div style="flex:1">
      <div id="quiz-topic-label" style="font-weight:700;font-size:14px"></div>
      <div class="progress"><div class="progress-bar" id="quiz-prog"></div></div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div id="quiz-qnum" style="font-size:11px;color:rgba(255,255,255,0.4)"></div>
      <span id="quiz-score-badge" class="badge" style="background:rgba(254,202,87,0.15);border-color:rgba(254,202,87,0.4);color:#FECA57"></span>
    </div>
  </div>
  <div id="quiz-type-badge" style="margin-bottom:10px"></div>
  <div class="card">
    <h2 id="quiz-question" style="font-size:16px;font-weight:700;line-height:1.6;margin-bottom:20px"></h2>
    <div id="quiz-options"></div>
  </div>
  <div id="quiz-result"></div>
</div>

<!-- RESULT -->
<div id="pg-result" class="page">
  <div id="result-hero" class="hero"></div>
  <h1 id="result-grade"></h1>
  <p id="result-sub"></p>
  <div class="stat-row" id="result-stats"></div>
  <div class="card" id="result-perf">
    <h3>Performance</h3>
    <div class="perf-bar-wrap"><div class="perf-bar" id="result-bar"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.3)">
      <span>0%</span><span>50%</span><span>100%</span>
    </div>
  </div>
  <div id="result-tip"></div>
  <div id="result-btns"></div>
</div>

<script>
var TOPICS=[
  {id:"arrays",label:"Arrays",emoji:"🔢",color:"#FF6B6B"},
  {id:"strings",label:"Strings",emoji:"🔤",color:"#FF9F43"},
  {id:"linkedlist",label:"Linked Lists",emoji:"🔗",color:"#FECA57"},
  {id:"stack",label:"Stack & Queue",emoji:"📚",color:"#48DBFB"},
  {id:"trees",label:"Trees",emoji:"🌳",color:"#1DD1A1"},
  {id:"graphs",label:"Graphs",emoji:"🕸️",color:"#54A0FF"},
  {id:"hashing",label:"Hashing",emoji:"🗝️",color:"#a29bfe"},
  {id:"sorting",label:"Sorting",emoji:"🔀",color:"#fd79a8"},
  {id:"binarysearch",label:"Binary Search",emoji:"🔍",color:"#F368E0"},
  {id:"recursion",label:"Recursion",emoji:"🔄",color:"#00D2D3"},
  {id:"dp",label:"Dynamic Programming",emoji:"⚡",color:"#FECA57"}
];

var QB={
  arrays:{
    theory:["Array: contiguous memory. Access by index = O(1). Address = base + index x size.","Search unsorted: O(n). Search sorted: O(log n) using Binary Search.","Insert/Delete: O(n) since elements must shift. Append at end: O(1) amortized.","Two Pointers: left and right converge inward. Used for pair sum, palindrome check.","Sliding Window: maintain window of k elements. Used for max sum subarray, longest substring.","Prefix Sum: P[i]=A[0]+...+A[i]. Range sum(l,r)=P[r]-P[l-1] in O(1) after O(n) build.","Kadane's Algorithm: max subarray in O(n). cur=max(arr[i], cur+arr[i]). Track global max.","Dutch National Flag: 3-pointer sort for 0s,1s,2s in ONE pass. O(n) time, O(1) space."],
    questions:[
      {type:"theory",q:"Time complexity of accessing an array element by index?",opts:["O(n)","O(log n)","O(1)","O(n^2)"],ans:2,exp:"O(1) because arrays are stored in contiguous memory. Address = base + index x element_size, computed instantly without any traversal."},
      {type:"theory",q:"Which algorithm solves Maximum Subarray Sum in O(n)?",opts:["Merge Sort","Binary Search","Kadane's Algorithm","Prefix Sum"],ans:2,exp:"Kadane's: cur = max(arr[i], cur+arr[i]). If extending is worse than starting fresh, reset. Track the global max throughout. O(n) time, O(1) space."},
      {type:"theory",q:"Prefix Sum gives range sum queries in what time after O(n) build?",opts:["O(n) per query","O(log n) per query","O(1) per query","O(n^2) per query"],ans:2,exp:"Build P[i]=A[0]+...+A[i] once in O(n). Then sum(l,r)=P[r]-P[l-1] in O(1). Great for multiple range queries."},
      {type:"lc",q:"LC #1 Two Sum: nums=[2,7,11,15], target=9. Which approach is O(n)?",opts:["Sort + Two Pointers","Nested loops O(n^2)","HashMap: store complement of each num","Binary search each element"],ans:2,exp:"HashMap: for each num, check if (target-num) exists in map. If yes return pair. Else store num. Single pass = O(n) time, O(n) space. Classic space-for-speed tradeoff."},
      {type:"lc",q:"LC #53 Max Subarray: what is the answer for [-2,1,-3,4,-1,2,1,-5,4]?",opts:["4","5","6","7"],ans:2,exp:"Answer is 6 from subarray [4,-1,2,1]. Kadane's trace: running sums = -2,1,-2,4,3,5,6,1,5. Global max = 6 at index 6."}
    ]
  },
  strings:{
    theory:["Strings: immutable character sequences in Java/Python. Concatenation creates new object.","KMP pattern matching: O(n+m) using LPS failure function. No backtracking in text.","Rabin-Karp: rolling hash for pattern matching. O(n+m) average, O(nm) worst case.","Anagram check: int[26] freq array. +1 for s1, -1 for s2. All zeros means anagram. O(n) O(1).","Palindrome: two pointers from both ends converging inward. O(n) time, O(1) space.","Sliding Window: longest substring without repeating chars using HashSet + two pointers. O(n).","Trie (Prefix Tree): insert and search in O(m) where m = word length. Great for autocomplete.","Z-algorithm: find all occurrences of pattern in text in O(n+m). Simpler than KMP."],
    questions:[
      {type:"theory",q:"Time complexity of KMP pattern matching?",opts:["O(n x m)","O(n+m)","O(n log m)","O(m^2)"],ans:1,exp:"KMP: O(m) to build LPS failure array, then O(n) for matching. Total O(n+m). No character in the text is ever revisited."},
      {type:"theory",q:"How to check if two strings are anagrams in O(n) O(1) space?",opts:["Sort both O(n log n)","int[26]: +1 for s1 and -1 for s2, check all zeros","Compare char by char","Use rolling hash"],ans:1,exp:"int[26] frequency array: increment for each char in s1, decrement for each char in s2. If any slot is not 0 then not anagrams. O(n) time, O(26)=O(1) space."},
      {type:"lc",q:"LC #3 Longest Substring Without Repeating Chars: best approach?",opts:["Brute force O(n^3)","Sliding window + HashSet O(n)","Sort then scan O(n log n)","DP table O(n^2)"],ans:1,exp:"Sliding window: HashSet holds chars in current window. Extend right pointer. On duplicate found, shrink left pointer. Each char added or removed at most once so O(n) total."},
      {type:"lc",q:"LC #5 Longest Palindromic Substring: for 'babad', valid answers are?",opts:["Only 'bab'","Only 'aba'","Both 'bab' and 'aba' are valid (length 3)","'babad' itself"],ans:2,exp:"Both 'bab' and 'aba' are correct since both have length 3. Method: expand-around-center at each index. O(n^2) time, O(1) space."}
    ]
  },
  linkedlist:{
    theory:["Singly LL: node = data + next pointer. Doubly LL: data + next + prev pointers.","Access: O(n) since you must traverse from head. Insert/Delete at head: O(1).","Floyd's Cycle Detection: slow(1 step) + fast(2 steps). If they meet then cycle exists. O(n) O(1).","Find Middle: slow+fast pointers. When fast hits end, slow is at middle. Single pass O(n).","Reverse Iteratively: prev=null, curr=head. Swap curr.next=prev each step. O(n) O(1).","Merge Two Sorted Lists: dummy head node + compare both heads, attach smaller, advance pointer.","Remove Nth from End: two pointers with gap of n. When fast reaches end, slow.next is target.","Detect Cycle Start: after Floyd meeting, move one pointer to head. They meet at cycle start."],
    questions:[
      {type:"theory",q:"What is Floyd's Cycle Detection algorithm?",opts:["HashSet of all visited addresses","Slow(1)+Fast(2) pointers: if they meet then cycle exists","Count nodes and check repeats","DFS from head"],ans:1,exp:"Floyd's: slow moves 1 step, fast moves 2 steps. If cycle exists, fast laps slow and they must meet inside it. Mathematically guaranteed. O(n) time, O(1) space. No extra memory!"},
      {type:"theory",q:"How to find Linked List middle in one pass?",opts:["Count all then traverse again to n/2","Slow(1)+Fast(2): slow is at middle when fast hits end","Store all nodes in array","Binary search the list"],ans:1,exp:"When fast reaches null, slow is at the middle node. For 6 nodes: fast takes 3 jumps to end, slow takes 3 steps to reach middle. Single O(n) pass, O(1) space."},
      {type:"lc",q:"LC #206 Reverse Linked List: best iterative approach?",opts:["Push all to stack then pop","prev=null,curr=head; reverse curr.next=prev each step","Recursively from tail","Store in array and re-link"],ans:1,exp:"Three-pointer: while(curr!=null){ next=curr.next; curr.next=prev; prev=curr; curr=next; } Return prev. O(n) time, O(1) space."},
      {type:"lc",q:"LC #21 Merge Two Sorted Lists: time complexity of optimal solution?",opts:["O(n log n)","O(n+m)","O(n^2)","O(max(n,m)^2)"],ans:1,exp:"O(n+m): use a dummy head node. Compare l1 and l2 heads, attach the smaller one, advance that pointer. Repeat until one list is exhausted then attach remaining. Exactly n+m steps. O(1) extra space."}
    ]
  },
  stack:{
    theory:["Stack: LIFO. push/pop/peek all O(1). Built with array or linked list.","Queue: FIFO. enqueue/dequeue O(1) with deque. ArrayDeque is fastest in Java.","Monotonic Stack: maintains increasing or decreasing order. Solves Next Greater Element in O(n).","Two-Stack Queue: enqueue to S1; dequeue from S2 (pour S1 to S2 when S2 empty). Amortized O(1).","Stack apps: balanced parentheses, infix to postfix, undo history, function call stack, DFS.","Queue apps: BFS, level-order traversal, task scheduling, sliding window maximum.","Monotonic Deque: for Sliding Window Max. Remove smaller from back, expired from front. O(n).","Min Stack: store (value, current_min) pairs. getMin() always O(1)."],
    questions:[
      {type:"theory",q:"What does a Monotonic Stack solve efficiently?",opts:["Sorting in O(n)","Next Greater/Smaller Element in O(n) total","Implementing a queue","Balanced parentheses only"],ans:1,exp:"Push index onto stack. When arr[i] > arr[stack.top()], that element's Next Greater is arr[i]. Pop and record answer. Each element pushed/popped exactly once so O(n) total vs O(n^2) brute force."},
      {type:"theory",q:"How to implement Queue using two Stacks?",opts:["Not possible","S1 for enqueue; S2 for dequeue: pour S1 to S2 when S2 is empty","Use both simultaneously","Use linked list internally"],ans:1,exp:"Enqueue: push to S1. Dequeue: if S2 empty, pour ALL of S1 into S2 which reverses order, then pop from S2. Each element moves at most twice so amortized O(1). This is LeetCode #232."},
      {type:"lc",q:"LC #20 Valid Parentheses: is '([{}])' valid?",opts:["Yes it is valid","No it is invalid","Depends on language","Stack overflow"],ans:0,exp:"YES it is valid. Stack approach: push opening brackets. On closing bracket, pop top and verify match. Trace: push ( then [ then {. See } so pop { which matches. See ] so pop [ which matches. See ) so pop ( which matches. Stack empty at end means valid."},
      {type:"lc",q:"LC #239 Sliding Window Maximum: which gives O(n) solution?",opts:["Max-Heap O(n log k)","Monotonic Deque O(n)","Sorted Set O(n log k)","Two pointers O(n^2)"],ans:1,exp:"Monotonic Deque: keep indices in decreasing value order. Remove back indices with values smaller than or equal to arr[i] since they are useless. Remove front if outside window. Front is always current window max. O(n) total."}
    ]
  },
  trees:{
    theory:["Binary Tree: each node has at most 2 children. Root at top, leaves at bottom.","BST: left < root < right. Search/Insert/Delete O(h). Balanced BST gives O(log n).","Inorder (LNR): sorted output for BST. Preorder (NLR): clone. Postorder (LRN): delete tree.","BFS Level Order: use Queue. Enqueue root then loop: dequeue, process, enqueue children.","Height: 1 + max(height(left), height(right)). Leaf height = 1. Null height = 0.","Diameter: longest path between any two nodes. This path may NOT pass through root!","LCA (Lowest Common Ancestor): deepest node that is ancestor of both target nodes.","Segment Tree: O(log n) range queries AND point updates. Beats prefix sum for mutable arrays."],
    questions:[
      {type:"theory",q:"Inorder traversal of a BST produces what output?",opts:["Random order","Sorted ascending
