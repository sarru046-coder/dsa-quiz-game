<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DSA Quiz Master 🧠</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0f0c29;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes up{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fall{to{top:110vh;transform:rotate(720deg);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.bob{animation:bob 3s ease-in-out infinite}
.pop{animation:pop .45s cubic-bezier(.34,1.56,.64,1) both}
.up{animation:up .3s ease both}
.wrap{max-width:760px;margin:0 auto;padding:18px 14px 60px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;margin-bottom:14px}
.topbar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:11px 14px;margin-bottom:20px}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:10px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;font-family:inherit}
.back-btn:active{opacity:.7}
.btn{border:none;color:#fff;border-radius:12px;padding:12px 22px;cursor:pointer;font-size:14px;font-weight:700;display:inline-block;margin:4px 4px 4px 0;font-family:inherit}
.btn:active{opacity:.8;transform:scale(.97)}
.ghost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:12px;padding:12px 22px;cursor:pointer;font-size:14px;font-weight:600;display:inline-block;margin:4px 4px 4px 0;font-family:inherit}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:700;border:1px solid}
.topic-card{border-radius:16px;padding:18px 14px;cursor:pointer;text-align:center;border:1px solid;transition:transform .15s}
.topic-card:active{transform:scale(.95)}
.opt{width:100%;border-radius:12px;padding:13px 16px;color:#fff;cursor:pointer;font-size:14px;text-align:left;margin-bottom:10px;display:flex;align-items:center;gap:12px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);transition:background .15s;font-family:inherit}
.opt:not([disabled]):active{background:rgba(255,255,255,.15)}
.opt-correct{background:rgba(29,209,161,.2)!important;border-color:#1DD1A1!important;box-shadow:0 0 18px rgba(29,209,161,.3)}
.opt-wrong{background:rgba(255,107,107,.2)!important;border-color:#FF6B6B!important;box-shadow:0 0 18px rgba(255,107,107,.3)}
.opt-icon{min-width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);font-size:13px;font-weight:800;flex-shrink:0}
.prog-wrap{width:100%;background:rgba(255,255,255,.08);border-radius:99px;height:6px;overflow:hidden;margin-top:4px}
.prog-bar{height:100%;border-radius:99px;transition:width .5s ease}
.theory-point{display:flex;gap:10px;padding:10px 14px;margin-bottom:8px;background:rgba(255,255,255,.04);border-radius:10px;border-left:3px solid}
.confetti-el{position:fixed;pointer-events:none;z-index:9999;font-size:2rem;animation:fall 1.8s ease-in forwards}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;text-align:center}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.path-card{border-radius:18px;padding:20px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);transition:transform .15s}
.path-card:active{transform:scale(.96)}
.topics-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
</style>
</head>
<body>
<div id="app"></div>
<script>
var TOPICS=[
  {id:"arrays",label:"Arrays",emoji:"🔢",color:"#FF6B6B"},
  {id:"strings",label:"Strings",emoji:"🔤",color:"#FF9F43"},
  {id:"linkedlist",label:"Linked Lists",emoji:"🔗",color:"#FECA57"},
  {id:"stack",label:"Stack & Queue",emoji:"📚",color:"#48DBFB"},
  {id:"trees",label:"Trees",emoji:"🌳",color:"#1DD1A1"},
  {id:"graphs",label:"Graphs",emoji:"🕸️",color:"#54A0FF"},
  {id:"hashing",label:"Hashing",emoji:"🗝️",color:"#a29bfe"},
  {id:"sorting",label:"Sorting",emoji:"🔀",color:"#fd79a8"},
  {id:"binarysearch",label:"Binary Search",emoji:"🔍",color:"#F368E0"},
  {id:"recursion",label:"Recursion",emoji:"🔄",color:"#00D2D3"},
  {id:"dp",label:"Dynamic Programming",emoji:"⚡",color:"#FECA57"}
];

var QB={
  arrays:{
    theory:[
      "Array: contiguous memory block. Access by index = O(1) — address = base + index x size.",
      "Search unsorted: O(n). Search sorted: O(log n) using Binary Search.",
      "Insert/Delete: O(n) — elements must shift. Append at end: O(1) amortized.",
      "Two Pointers: left & right converge inward — pair sum, palindrome, container with most water.",
      "Sliding Window: maintain window of size k — max sum subarray, longest substring problems.",
      "Prefix Sum: P[i]=A[0]+...+A[i]. Range sum(l,r)=P[r]-P[l-1] in O(1) after O(n) build.",
      "Kadane's Algorithm: max subarray O(n). cur=max(arr[i], cur+arr[i]). Track global max.",
      "Dutch National Flag: 3-pointer sort for 0s,1s,2s in ONE pass O(n) O(1) space."
    ],
    questions:[
      {type:"theory",q:"Time complexity of accessing an array element by index?",opts:["O(n)","O(log n)","O(1)","O(n^2)"],ans:2,exp:"O(1) — arrays are contiguous in memory. Address = base + index x element_size, computed instantly without any traversal."},
      {type:"theory",q:"Which algorithm solves Maximum Subarray Sum in O(n)?",opts:["Merge Sort","Binary Search","Kadane's Algorithm","Prefix Sum"],ans:2,exp:"Kadane's: cur = max(arr[i], cur+arr[i]). Start fresh if extending makes it worse. Track the global max throughout. O(n) time, O(1) space."},
      {type:"theory",q:"Prefix Sum allows range sum queries in what complexity after O(n) build?",opts:["O(n) per query","O(log n) per query","O(1) per query","O(n^2) per query"],ans:2,exp:"Build P[i]=A[0]+...+A[i] in O(n). Then sum(l,r)=P[r]-P[l-1] in O(1). Perfect for many range sum queries after one-time setup."},
      {type:"lc",q:"LC #1 Two Sum — nums=[2,7,11,15], target=9. Which is O(n)?",opts:["Sort + Two Pointers O(n log n)","Nested loops O(n^2)","HashMap: store complement of each num","Binary search each element"],ans:2,exp:"HashMap: for each num, check if (target-num) exists in map. Found? Return pair. Else store num. Single pass O(n) time, O(n) space. Classic space-time tradeoff."},
      {type:"lc",q:"LC #53 Max Subarray — answer for [-2,1,-3,4,-1,2,1,-5,4]?",opts:["4","5","6","7"],ans:2,exp:"Answer is 6 — subarray [4,-1,2,1]. Kadane's trace: running sums are -2,1,-2,4,3,5,6,1,5. Global max=6 ending at index 6."}
    ]
  },
  strings:{
    theory:[
      "Strings: immutable character arrays in Java/Python. Concatenation creates a new object.",
      "KMP pattern matching: O(n+m) using LPS failure function — avoids backtracking in text.",
      "Rabin-Karp: rolling hash for pattern matching. O(n+m) average, O(nm) worst case.",
      "Anagram check: int[26] freq array. +1 for s1, -1 for s2. All zeros = anagram. O(n) O(1).",
      "Palindrome: two pointers from both ends converging inward. O(n) time, O(1) space.",
      "Sliding Window: longest substring without repeating chars — HashSet + two pointers O(n).",
      "Trie (Prefix Tree): insert and search in O(m) where m=word length. Great for autocomplete.",
      "Z-algorithm: find all occurrences of pattern in text in O(n+m). Simpler than KMP."
    ],
    questions:[
      {type:"theory",q:"Time complexity of KMP pattern matching?",opts:["O(n x m)","O(n+m)","O(n log m)","O(m^2)"],ans:1,exp:"KMP: O(m) to build the LPS failure array, O(n) for matching. Total O(n+m). No character in text is ever revisited — each processed at most twice."},
      {type:"theory",q:"How to check if two strings are anagrams in O(n) O(1) space?",opts:["Sort both strings O(n log n)","int[26]: +1 for s1, -1 for s2, check all zeros","Compare char by char","Use rolling hash"],ans:1,exp:"int[26] frequency array: for s1 increment, for s2 decrement. If any slot != 0, not anagrams. O(n) time, O(26)=O(1) space. Simple and optimal."},
      {type:"lc",q:"LC #3 Longest Substring Without Repeating Chars — best approach?",opts:["Brute force O(n^3)","Sliding window + HashSet O(n)","Sort then scan O(n log n)","DP table O(n^2)"],ans:1,exp:"Sliding window: HashSet holds chars in window [left,right]. Extend right; on duplicate shrink left until removed. Each char added/removed at most once so O(n) total."},
      {type:"lc",q:"LC #5 Longest Palindromic Substring — for 'babad', valid answers?",opts:["Only 'bab'","Only 'aba'","Both 'bab' and 'aba' are valid","'babad' itself"],ans:2,exp:"Both 'bab' and 'aba' are correct (both length 3). Expand-around-center at each index. O(n^2) time, O(1) space."}
    ]
  },
  linkedlist:{
    theory:[
      "Singly LL: node = data + next pointer. Doubly LL: data + next + prev pointers.",
      "Access: O(n) — must traverse from head. Insert/Delete at head: O(1).",
      "Floyd's Cycle Detection: slow(1 step) + fast(2 steps). If they meet -> cycle. O(n) O(1).",
      "Find Middle: slow+fast pointers. When fast hits end, slow is at middle. Single pass O(n).",
      "Reverse Iteratively: prev=null, curr=head. next=curr.next; curr.next=prev; prev=curr; curr=next.",
      "Merge Two Sorted Lists: dummy head + compare both heads, attach smaller, advance that pointer.",
      "Remove Nth from End: two pointers gap of n. When fast reaches end, slow.next is the target.",
      "Detect Cycle Start: after Floyd meeting, move one pointer to head. They meet at cycle start."
    ],
    questions:[
      {type:"theory",q:"What is Floyd's Cycle Detection algorithm?",opts:["HashSet of all visited addresses","Slow(1 step)+Fast(2 steps) — meet inside cycle if it exists","Count nodes and check repeats","DFS from head"],ans:1,exp:"Floyd's: slow moves 1 step, fast 2 steps. If cycle exists, fast laps slow and they must meet inside it. Mathematically guaranteed. O(n) time, O(1) space."},
      {type:"theory",q:"How to find Linked List middle in one pass?",opts:["Count all, traverse again to n/2","Slow(1)+Fast(2) — slow is at middle when fast hits end","Store all nodes in array","Binary search the list"],ans:1,exp:"When fast reaches null, slow is at middle. For 6 nodes: fast takes 3 jumps to end, slow takes 3 steps to middle node. Single O(n) pass, O(1) space."},
      {type:"lc",q:"LC #206 Reverse Linked List — best iterative approach?",opts:["Push all to stack, pop to rebuild","prev=null,curr=head; reverse curr.next=prev each step","Recursively from tail","Store in array and re-link"],ans:1,exp:"Three-pointer: while(curr!=null){next=curr.next; curr.next=prev; prev=curr; curr=next;} Return prev. O(n) time, O(1) space."},
      {type:"lc",q:"LC #21 Merge Two Sorted Lists — time complexity of optimal?",opts:["O(n log n)","O(n+m)","O(n^2)","O(max(n,m)^2)"],ans:1,exp:"O(n+m): dummy head node. Compare l1 and l2 heads, attach smaller, advance that pointer. Repeat until one list exhausted, attach remaining. Exactly n+m steps. O(1) extra space."}
    ]
  },
  stack:{
    theory:[
      "Stack: LIFO. push/pop/peek all O(1). Built with array or linked list.",
      "Queue: FIFO. enqueue/dequeue O(1) with deque. ArrayDeque is fastest in Java.",
      "Monotonic Stack: maintains increasing or decreasing order. Solves Next Greater Element in O(n).",
      "Two-Stack Queue: enqueue to S1; dequeue from S2 (pour S1 to S2 when S2 empty). Amortized O(1).",
      "Stack apps: balanced parentheses, infix to postfix, undo history, function call stack, DFS.",
      "Queue apps: BFS, level-order tree traversal, task scheduling, sliding window maximum.",
      "Monotonic Deque: for Sliding Window Max — remove smaller from back, expired from front. O(n).",
      "Min Stack: store (value, current_min) pairs. getMin() always O(1)."
    ],
    questions:[
      {type:"theory",q:"What does a Monotonic Stack solve efficiently?",opts:["Sort in O(n)","Next Greater/Smaller Element in O(n) total","Implementing a queue","Balanced parentheses only"],ans:1,exp:"Push index onto stack. When arr[i] > arr[stack.top()], that element's Next Greater is arr[i]. Pop and record. Each element pushed/popped exactly once so O(n) total vs O(n^2) brute force."},
      {type:"theory",q:"How to implement Queue using two Stacks?",opts:["Not possible","S1 for enqueue; S2 for dequeue — pour S1 to S2 when S2 is empty","Use both simultaneously","Use linked list internally"],ans:1,exp:"Enqueue: push to S1. Dequeue: if S2 empty, pour ALL of S1 into S2 (reverses order), then pop from S2. Each element moves at most twice so amortized O(1). This is LeetCode #232."},
      {type:"lc",q:"LC #20 Valid Parentheses — is '([{}])' valid?",opts:["Yes — valid","No — invalid","Depends on language","Stack overflow"],ans:0,exp:"YES! Stack: push opening brackets. On closing bracket, pop top and verify match. Trace: push '(' '[' '{'; see '}' pop '{' OK; see ']' pop '[' OK; see ')' pop '(' OK. Stack empty at end so VALID."},
      {type:"lc",q:"LC #239 Sliding Window Maximum — which gives O(n)?",opts:["Max-Heap O(n log k)","Monotonic Deque O(n)","Sorted Set O(n log k)","Two pointers O(n^2)"],ans:1,exp:"Monotonic Deque: keep indices in decreasing value order. Remove back if value <= arr[i]. Remove front if outside window. Front is always current window max. O(n) total — each index added/removed once."}
    ]
  },
  trees:{
    theory:[
      "Binary Tree: each node has at most 2 children. Root at top, leaves at bottom.",
      "BST: left < root < right. Search/Insert/Delete O(h). Balanced BST gives O(log n).",
      "Inorder (LNR): sorted output for BST. Preorder (NLR): clone/serialize. Postorder (LRN): delete.",
      "BFS Level Order: use Queue. Enqueue root then loop: dequeue, process, enqueue children.",
      "Height: 1 + max(height(left), height(right)). Leaf=1. Null=0.",
      "Diameter: longest path between any two nodes. May NOT pass through root!",
      "LCA (Lowest Common Ancestor): deepest node that is ancestor of both targets.",
      "Segment Tree: O(log n) range queries AND point updates. Beats prefix sum for mutable arrays."
    ],
    questions:[
      {type:"theory",q:"Inorder traversal of a BST produces?",opts:["Random order","Sorted ascending order","Level-by-level order","Reverse sorted"],ans:1,exp:"Inorder (Left->Node->Right) of any BST gives elements in SORTED ascending order. Used to verify BST validity and find kth smallest element."},
      {type:"theory",q:"Data structure for BFS Level-Order tree traversal?",opts:["Stack","Queue","Priority Queue","Deque"],ans:1,exp:"Queue (FIFO): enqueue root. Loop: dequeue, process, enqueue left child, enqueue right child. FIFO ensures all level-k nodes processed before level-(k+1). Stack gives DFS instead."},
      {type:"theory",q:"Height of balanced binary tree with n nodes?",opts:["O(n)","O(n^2)","O(log n)","O(n log n)"],ans:2,exp:"Each level doubles nodes: level h has 2^h nodes. So n~2^h giving h~log2(n). Unbalanced tree degrades to O(n) height like a linked list. Balancing keeps it O(log n)."},
      {type:"lc",q:"LC #236 LCA of Binary Tree — key recursive insight?",opts:["BFS from both nodes","If root==p or q return root; recurse both sides; if both non-null then current node is LCA","Sort by depth","Use parent pointers"],ans:1,exp:"If both left and right recursions return non-null, p and q are in different subtrees so current node is the LCA. If only one side is non-null, LCA is deeper in that subtree. O(n) time."},
      {type:"lc",q:"LC #543 Diameter — what does it represent?",opts:["Tree height","Node count","Longest path between ANY two nodes (may skip root)","Widest level"],ans:2,exp:"Diameter = longest path (edges) between any two nodes. It can bypass the root entirely! For each node: candidate = left_height + right_height. Global max of all candidates = diameter. Single DFS O(n)."}
    ]
  },
  graphs:{
    theory:[
      "Graph: V vertices + E edges. Directed or Undirected. Weighted or Unweighted.",
      "BFS: shortest path (unweighted) O(V+E). Queue-based. Explores layer by layer.",
      "DFS: cycle detection, topological sort, connected components O(V+E). Uses stack/recursion.",
      "Dijkstra: shortest path (non-negative weights) O((V+E) log V) with min-heap.",
      "Bellman-Ford: allows negative weights O(V x E). Also detects negative weight cycles.",
      "Floyd-Warshall: all-pairs shortest path O(V^3). DP through each intermediate node.",
      "Union-Find (DSU): near-O(1) per op with path compression + union by rank. Used in Kruskal's.",
      "Topological Sort: only for DAGs. Kahn's (BFS + in-degree) or DFS with finish order."
    ],
    questions:[
      {type:"theory",q:"Shortest path in UNWEIGHTED graph — best algorithm?",opts:["Dijkstra","BFS","DFS","Bellman-Ford"],ans:1,exp:"BFS guarantees minimum edges (shortest path) in unweighted graphs. Each BFS layer = one more edge from source. First time we reach a node = fewest edges possible. O(V+E)."},
      {type:"theory",q:"When does Dijkstra FAIL?",opts:["Disconnected graphs","Graphs with NEGATIVE edge weights","Undirected graphs","Dense graphs"],ans:1,exp:"Dijkstra assumes: once a node is popped from min-heap, its distance is FINAL. Negative edges can create shortcuts found later, breaking this assumption. Use Bellman-Ford O(V x E) for negative edges."},
      {type:"theory",q:"Topological Sort requires what type of graph?",opts:["Undirected","DAG — Directed Acyclic Graph","Weighted","Connected only"],ans:1,exp:"Topological sort only works for DAGs. Cycles make it impossible. Kahn's algorithm detects cycles: if result has fewer than V nodes, a cycle exists in the graph."},
      {type:"lc",q:"LC #200 Number of Islands — valid approaches?",opts:["BFS only","DFS only","Union-Find only","BFS, DFS, and Union-Find all work — each O(m x n)"],ans:3,exp:"All three work in O(m x n). DFS/BFS: find '1', flood-fill connected '1's to '0', count calls. Union-Find: union adjacent '1' cells, count distinct roots. DFS is simplest to code."},
      {type:"lc",q:"LC #207 Course Schedule (cycle detection)?",opts:["Dijkstra","DFS with 3 states (white/gray/black) OR Kahn's topological sort","BFS level traversal","Floyd-Warshall"],ans:1,exp:"DFS: WHITE=unvisited, GRAY=in current path, BLACK=done. Reaching GRAY = cycle! Kahn's: if topo sort processes all n nodes then no cycle. Fewer nodes = cycle exists. Both O(V+E)."}
    ]
  },
  hashing:{
    theory:[
      "HashMap: key-value pairs. Average O(1) insert/delete/search. Worst O(n) on all-collision.",
      "Hash Function: maps key to bucket index. Good functions distribute uniformly.",
      "Chaining: each bucket holds a linked list of all colliding elements. Handles high load well.",
      "Open Addressing: probe for next empty slot — linear, quadratic, or double hashing.",
      "Load Factor: n/m (items/buckets). Java HashMap rehashes at 0.75 to keep O(1) amortized.",
      "HashSet: unique keys only. O(1) contains/add/remove. Used for visited-node tracking.",
      "Use cases: Two Sum, anagram grouping, frequency count, duplicate detection, LRU Cache.",
      "LRU Cache = HashMap + Doubly Linked List gives O(1) get AND put. Classic design interview."
    ],
    questions:[
      {type:"theory",q:"Average time complexity for HashMap get/put?",opts:["O(n)","O(log n)","O(1)","O(n log n)"],ans:2,exp:"O(1) average with good hash function and low load factor. Worst case O(n) if all keys collide to same bucke
