    questions:[
      {id:"a1",type:"theory",q:"What is the time complexity of accessing an array element by index?",options:["O(n)","O(log n)","O(1)","O(n²)"],answer:2,explanation:"O(1) — arrays are stored contiguously. Address = base + index × element_size, computed instantly. This is what makes arrays so powerful for random access."},
      {id:"a2",type:"theory",q:"Which algorithm solves Maximum Subarray Sum in O(n)?",options:["Merge Sort","Binary Search","Kadane's Algorithm","Prefix Sum"],answer:2,explanation:"Kadane's: maintain running sum cur = max(arr[i], cur + arr[i]). If extending is worse than starting fresh, reset. Track global max throughout. O(n) time, O(1) space."},
      {id:"a3",type:"theory",q:"Prefix Sum allows range sum queries in what complexity (after O(n) build)?",options:["O(n) per query","O(log n) per query","O(1) per query","O(n²) per query"],answer:2,explanation:"Build P[i] = A[0]+…+A[i] in O(n). Then sum(l,r) = P[r] – P[l–1] in O(1). Perfect for many range queries after one-time preprocessing."},
      {id:"a4",type:"leetcode",q:"LC #1 Two Sum — nums=[2,7,11,15], target=9. Which gives O(n)?",options:["Sort + Two Pointers O(n log n)","Nested loops O(n²)","HashMap: store complement of each num","Binary search each element O(n log n)"],answer:2,explanation:"HashMap: for each num, check if (target–num) exists in map. Yes → found! No → store num. Single pass O(n) time, O(n) space. Classic space-time tradeoff."},
      {id:"a5",type:"leetcode",q:"LC #53 Max Subarray — what is the answer for [-2,1,-3,4,-1,2,1,-5,4]?",options:["4","5","6","7"],answer:2,explanation:"Answer is 6 — subarray [4,–1,2,1]. Kadane's trace: running sums: –2,1,–2,4,3,5,6,1,5. Global max = 6, ending at index 6 (value 1), starting at index 3 (value 4)."},
    ]

      {id:"s2",type:"theory",q:"How to check if two strings are anagrams in O(n) time, O(1) space?",options:["Sort both and compare O(n log n)","Frequency array int[26]: +1 for s1, -1 for s2, check all zeros","Compare char by char directly","Rolling hash both strings"],answer:1,explanation:"int[26] freq array: for each char in s1 → freq[c–'a']++; for each char in s2 → freq[c–'a']--. If any value ≠ 0 → not anagrams. O(n) time, O(26) = O(1) space."},

      {id:"l1",type:"theory",q:"What is Floyd's Cycle Detection algorithm?",options:["HashSet to store all visited node addresses","Slow (1 step) + Fast (2 steps) — if they meet, cycle exists","Count nodes and check for total repetition","DFS from head node"],answer:1,explanation:"Floyd's: slow moves 1 step, fast 2 steps each iteration. If cycle exists, fast eventually 'laps' slow and they meet inside the cycle — mathematically guaranteed. O(n) time, O(1) space. No extra memory!"},
      {id:"l2",type:"theory",q:"How to find the middle of a Linked List in one pass?",options:["Count nodes, traverse again to n/2","Slow (1 step) + Fast (2 steps) pointer technique","Store all nodes in array, return index n/2","Binary search on the list"],answer:1,explanation:"When fast pointer reaches null (end), slow pointer is at the middle. For 6 nodes: fast takes 3 jumps to reach end; slow takes 3 steps to reach node 4 (middle). Single O(n) pass, O(1) space."},
      {id:"l3",type:"leetcode",q:"LC #206 Reverse Linked List — best iterative approach?",options:["Use a stack, push all, pop to rebuild","prev=null, curr=head; each step: reverse curr.next=prev, advance both","Recursively reverse from the tail","Store in array and re-link in reverse"],answer:1,explanation:"Three-pointer: while(curr != null) { next = curr.next; curr.next = prev; prev = curr; curr = next; } Return prev. O(n) time, O(1) space. Recursion works but uses O(n) call stack space."},

      {id:"sq1",type:"theory",q:"What problem does a Monotonic Stack solve efficiently?",options:["Sorting in O(n)","Finding Next Greater/Smaller Element in O(n) total","Implementing a queue using stacks","Balanced parentheses checking"],answer:1,explanation:"Monotonic Stack for NGE: push index. When arr[i] > arr[stack.top()], that top element's NGE is arr[i]. Pop and record. Each element pushed/popped exactly once → O(n) total. Naive brute-force is O(n²)."},
      {id:"sq2",type:"theory",q:"How to implement a Queue using two Stacks?",options:["Not possible","Stack1 for enqueue; Stack2 for dequeue — transfer S1→S2 when S2 is empty","Use both stacks simultaneously","Use a linked list internally"],answer:1,explanation:"Enqueue: push to S1. Dequeue: if S2 empty, pour ALL of S1 into S2 (this reverses order), then pop from S2. Each element moves at most twice total → amortized O(1) per operation. This is LeetCode #232."},
      {id:"sq3",type:"leetcode",q:"LC #20 Valid Parentheses — is '([{}])' valid?",options:["Yes, valid","No, invalid","Only in some languages","Stack would overflow"],answer:0,explanation:"YES! Push opening brackets. On closing: pop top and verify match. Trace: push '(' → push '[' → push '{' → see '}': pop '{' ✓ → see ']': pop '[' ✓ → see ')': pop '(' ✓. Stack empty at end → VALID."},

      {id:"t1",type:"theory",q:"Inorder traversal of a BST produces what output?",options:["Random order","Sorted ascending order","Level-by-level order","Reverse sorted order"],answer:1,explanation:"Inorder (Left→Node→Right) of any BST gives elements in sorted ascending order. This is the fundamental BST property used to verify BST validity, find kth smallest, and convert BST to sorted array."},
      {id:"t2",type:"theory",q:"What data structure powers BFS Level-Order tree traversal?",options:["Stack","Queue","Priority Queue","Deque"],answer:1,explanation:"Queue (FIFO): enqueue root. Loop: dequeue node → process → enqueue left child → enqueue right child. FIFO guarantees all level-k nodes are processed before any level-(k+1) node. Stack gives DFS, not BFS."},
      {id:"t3",type:"theory",q:"Height of a balanced binary tree with n nodes?",options:["O(n)","O(n²)","O(log n)","O(n log n)"],answer:2,explanation:"Each level doubles nodes: level 0=1, level 1=2, …, level h=2^h. So n ≈ 2^h → h ≈ log₂(n). Unbalanced tree (like a linked list) degrades to O(n) height. Balancing algorithms (AVL, Red-Black) maintain O(log n)."},
      {id:"t4",type:"leetcode",q:"LC #236 LCA of Binary Tree — key recursive insight?",options:["BFS simultaneously from both nodes","If root==p or root==q return root; recurse both sides; if both non-null → current node is LCA","Sort nodes by depth","Use parent pointers to trace up to root"],answer:1,explanation:"Elegant recursion: base case → return if null/p/q. Recurse left and right. If BOTH return non-null → p and q are in different subtrees → current node is LCA! If only one side → LCA is deeper in that subtree. O(n) time."},
      {id:"t5",type:"leetcode",q:"LC #543 Diameter of Binary Tree — what does 'diameter' mean?",options:["Height of the tree","Number of nodes","Longest path between ANY two nodes (may NOT pass through root)","Width of the widest level"],answer:2,explanation:"Diameter = longest path (number of edges) between any two nodes. It may bypass the root entirely! For each node: path_through_it = left_height + right_height. Global max of all such values = diameter. Single DFS pass O(n)."},

      {id:"g2",type:"theory",q:"When does Dijkstra's algorithm FAIL?",options:["On disconnected graphs","On graphs with NEGATIVE edge weights","On undirected graphs","On very large graphs"],answer:1,explanation:"Dijkstra assumes: once a node is popped from the min-heap, its shortest distance is FINAL. Negative edges can create shorter paths discovered later, violating this. Use Bellman-Ford O(V×E) for negative edges."},

      {id:"g4",type:"leetcode",q:"LC #200 Number of Islands — most common approaches?",options:["BFS flood-fill only","DFS flood-fill only","Union-Find only","BFS, DFS, and Union-Find all work — each O(m×n)"],answer:3,explanation:"All three work in O(m×n). DFS/BFS: find '1', flood-fill all connected '1's to '0' (visited), count calls. Union-Find: union adjacent '1' cells, count distinct components. DFS is typically simplest to write in interviews."},
